<!-- SVG filters (liquid hover, grain) -->
<svg aria-hidden="true" style="position:absolute;width:0;height:0;pointer-events:none">
  <defs>
    <filter id="liquid-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.04" numOctaves="2" seed="3">
        <animate attributeName="baseFrequency" dur="6s" values="0.012 0.04;0.018 0.05;0.012 0.04" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" scale="14" />
    </filter>
  </defs>
</svg>

<div class="surface"></div>
<div class="grain"></div>

<div class="stage" id="stage">

        <li>AI Integration</li>
        <li>Revenue Impact</li>
      </ul>
    </div>

    <div class="grid-stage" id="gridStage">

      <div class="fill-rect"></div>
      <div class="grid" id="grid"></div>
    </div>

    <div class="morph" id="morph">
      <div class="word" id="morphWord">Field Notes</div>
    </div>

  </main>

  <footer class="bot-bar">
    <span>LAT 13.7563° N &nbsp;·&nbsp; LON 100.5018° E</span>
    <span><span class="dot"></span>NOW PLAYING / INTRO SEQUENCE</span>
    <div class="controls">

      <button class="btn" id="skipBtn">⤓ SKIP</button>
    </div>
  </footer>

</div>

    <div class="label">AKUMALI hover</div>
    <div class="tweak-seg" data-tweak="hoverMode">
      <button data-value="bounce" class="active">Bounce</button>
      <button data-value="liquid">Wave</button>
      <button data-value="3d">3D</button>
      <button data-value="scatter">Scatter</button>
      <button data-value="off">Off</button>
    </div>
  </div>
  <div class="tweak-row">
    <div class="label">Theme</div>
    <div class="tweak-seg" data-tweak="theme">
      <button data-value="light" class="active">Paper</button>
      <button data-value="dark">Stone</button>
    </div>
  </div>
  <div class="tweak-row">
    <div class="label">Tile hover</div>
    <div class="tweak-seg" data-tweak="tileHover">
      <button data-value="shape" class="active">Shape</button>
      <button data-value="lift">Lift</button>
      <button data-value="off">Off</button>
